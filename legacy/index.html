<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Current Weather</title>
    <!-- Carbon Design System core styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/carbon-components/css/carbon-components.min.css"
    />
    <!-- Local overrides -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-root bx--body">
      <main class="bx--grid bx--grid--full-width app-grid">
        <div class="bx--row app-row">
          <div class="bx--col-lg-6 bx--col-md-8 bx--col-sm-4">
            <section class="bx--tile app-tile">
              <header class="bx--tile__header app-header">
                <h1 class="bx--type-expressive-heading-04">Weather right now</h1>
                <p class="bx--type-body-long-01">
                  Search any location to see the current conditions.
                </p>
              </header>

              <form id="search-form" class="bx--form" aria-label="Location search">
                <div class="bx--form-item">
                  <label class="bx--label" for="location-input">Location</label>
                  <div class="bx--text-input__field-wrapper app-search-row">
                    <input
                      id="location-input"
                      class="bx--text-input"
                      type="text"
                      placeholder="e.g. London, Tokyo, New York"
                      autocomplete="off"
                      aria-describedby="search-hint search-error"
                      aria-invalid="false"
                    />
                    <button
                      id="search-btn"
                      class="bx--btn bx--btn--primary app-search-btn"
                      type="submit"
                    >
                      Search
                    </button>
                  </div>
                  <p id="search-hint" class="bx--form__helper-text">
                    Type a location name and press Enter or Search.
                  </p>
                  <p
                    id="search-error"
                    class="bx--form-requirement app-error-inline"
                    hidden
                    role="alert"
                    aria-live="polite"
                  ></p>
                </div>
              </form>

              <section
                id="weather-section"
                class="bx--tile app-weather"
                hidden
                aria-live="polite"
                aria-busy="false"
              >
                <div class="app-weather-main">
                  <div class="app-weather-icon-wrapper">
                    <span id="weather-icon" class="app-weather-icon" aria-hidden="true"
                      >☀️</span
                    >
                  </div>
                  <div class="app-weather-info">
                    <div class="app-weather-label-row">
                      <span
                        id="weather-label"
                        class="bx--type-productive-heading-03 app-weather-label"
                        >Clear sky</span
                      >
                      <span
                        id="weather-temp"
                        class="bx--type-expressive-heading-05 app-weather-temp"
                        >–°</span
                      >
                    </div>
                    <p id="weather-meta" class="bx--type-body-short-01">
                      Location:
                      <span id="weather-location">Unknown</span>
                    </p>
                    <p
                      id="weather-updated"
                      class="bx--type-caption-01 app-weather-updated"
                    ></p>
                  </div>
                </div>
              </section>

              <section
                id="error-section"
                class="bx--inline-notification bx--inline-notification--error app-error"
                hidden
                aria-live="polite"
                role="alert"
              >
                <div class="bx--inline-notification__details">
                  <div class="bx--inline-notification__text-wrapper">
                    <p
                      id="error-message"
                      class="bx--inline-notification__subtitle"
                    ></p>
                  </div>
                </div>
              </section>

              <footer class="app-footer">
                <p class="bx--type-caption-01 app-footer-text">
                  Built as a personal project. Weather data provided by Open-Meteo.
                </p>
              </footer>
            </section>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
